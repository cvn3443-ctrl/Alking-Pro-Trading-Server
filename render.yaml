services:
  - type: web
    name: alking-pro-trading
    runtime: python
    repo: https://github.com/cvn3443-ctrl/Alking-Pro-Trading-Server
    plan: free
    region: frankfurt
    buildCommand: pip install -r server/requirements.txt
    startCommand: cd server && uvicorn main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PORT
        value: 10000
